<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVault | University Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="orange.png" />
    <link rel="apple-touch-icon" href="orange.png" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      body {
        font-family: "Inter", sans-serif;
        scroll-behavior: smooth;
      }
      .transition-theme {
        transition:
          background-color 0.4s ease,
          color 0.4s ease;
      }
      .tab-btn {
        position: relative;
        transition: all 0.3s ease;
      }
      .tab-btn.active {
        color: #2563eb;
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: #2563eb;
        border-radius: 10px;
      }
      .subject-card {
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
      }
      .dark .subject-card {
        border-color: #1e293b;
        background: #0f172a;
      }
      .subject-card:hover {
        transform: translateY(-5px);
        border-color: #2563eb;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .sub-tab.active {
        background: #2563eb;
        color: white;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-900 dark:bg-[#020617] dark:text-slate-100 transition-theme min-h-screen"
  >
    <nav
      class="sticky top-0 z-50 bg-white/80 dark:bg-[#020617]/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"
    >
      <div
        class="max-w-6xl mx-auto px-4 md:px-6 h-16 flex justify-between items-center"
      >
        <div
          class="flex items-center space-x-2 cursor-pointer"
          onclick="goHome()"
        >
          <i
            class="fa-solid fa-graduation-cap text-blue-600 text-xl md:text-2xl"
          ></i>
          <h1 class="font-bold text-lg md:text-xl tracking-tight">
            Edu<span class="text-blue-600">Vault</span>
          </h1>
        </div>
        <button
          onclick="toggleTheme()"
          class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          <i id="theme-icon" class="fa-solid fa-moon text-slate-500"></i>
        </button>
      </div>
    </nav>

    <main id="home-page" class="max-w-6xl mx-auto px-4 md:px-6 py-8 md:py-12">
      <header class="mb-8 md:mb-16">
        <h2
          class="text-3xl md:text-6xl font-extrabold tracking-tight mb-4 leading-tight"
        >
          Master Your <span class="text-blue-600">Semester.</span>
        </h2>
        <p
          class="text-slate-500 dark:text-slate-400 text-base md:text-xl max-w-2xl leading-relaxed"
        >
          Dynamic notes, PYQs, and curated lectures directly from the EduVault
          cloud.
        </p>
      </header>

      <div
        class="flex gap-6 md:gap-10 border-b border-slate-200 dark:border-slate-800 mb-8 overflow-x-auto no-scrollbar pb-1"
      >
        <button
          onclick="renderHome(1)"
          id="sem-1"
          class="tab-btn active pb-4 font-extrabold text-lg md:text-xl whitespace-nowrap"
        >
          Sem I
        </button>
        <button
          onclick="renderHome(2)"
          id="sem-2"
          class="tab-btn pb-4 font-extrabold text-lg md:text-xl text-slate-400 whitespace-nowrap"
        >
          Sem II
        </button>
        <button
          onclick="renderHome(3)"
          id="sem-3"
          class="tab-btn pb-4 font-extrabold text-lg md:text-xl text-slate-400 whitespace-nowrap"
        >
          Sem III
        </button>
        <button
          onclick="renderHome(4)"
          id="sem-4"
          class="tab-btn pb-4 font-extrabold text-lg md:text-xl text-slate-400 whitespace-nowrap"
        >
          Sem IV
        </button>
      </div>

      <div
        id="subject-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 items-stretch"
      ></div>
    </main>

    <main
      id="detail-page"
      class="hidden max-w-6xl mx-auto px-4 md:px-6 py-8 md:py-12"
    >
      <button
        onclick="goHome()"
        class="mb-6 flex items-center text-blue-600 font-bold hover:gap-3 transition-all text-sm md:text-base"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
      </button>

      <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 items-start">
        <div
          class="w-full lg:w-1/3 lg:sticky lg:top-24 bg-white dark:bg-slate-900 p-6 md:p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm"
        >
          <div
            class="w-12 h-12 md:w-16 md:h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-2xl flex items-center justify-center mb-4 md:mb-6"
          >
            <i class="fa-solid fa-book-open-reader text-xl md:text-2xl"></i>
          </div>
          <h2
            id="detail-title"
            class="text-2xl md:text-3xl font-black mb-4 leading-tight"
          ></h2>
          <div
            class="flex items-center gap-2 text-green-500 font-bold text-xs md:text-sm mb-6"
          >
            <i class="fa-solid fa-circle-check"></i> Cloud Verified 2026
          </div>
          <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
            Unit-wise resources fetched dynamically from Supabase.
          </p>
        </div>

        <div class="w-full lg:w-2/3">
          <div
            class="flex gap-1 md:gap-2 p-1 bg-slate-200 dark:bg-slate-800 rounded-xl md:rounded-2xl mb-6 overflow-x-auto no-scrollbar"
          >
            <button
              onclick="switchSubTab('notes')"
              id="btn-notes"
              class="sub-tab active flex-1 py-3 px-2 rounded-lg md:rounded-xl font-bold text-[10px] md:text-xs uppercase tracking-widest transition-all whitespace-nowrap"
            >
              Notes
            </button>
            <button
              onclick="switchSubTab('pyqs')"
              id="btn-pyqs"
              class="sub-tab flex-1 py-3 px-2 rounded-lg md:rounded-xl font-bold text-[10px] md:text-xs uppercase tracking-widest transition-all whitespace-nowrap"
            >
              PYQs
            </button>
            <button
              onclick="switchSubTab('lectures')"
              id="btn-lectures"
              class="sub-tab flex-1 py-3 px-2 rounded-lg md:rounded-xl font-bold text-[10px] md:text-xs uppercase tracking-widest transition-all whitespace-nowrap"
            >
              Lectures
            </button>
          </div>
          <div id="tab-content" class="space-y-3 md:space-y-4"></div>
        </div>
      </div>
    </main>

    <footer
      class="max-w-6xl mx-auto px-6 py-12 border-t border-slate-200 dark:border-slate-800 text-center"
    >
      <p class="text-slate-400 text-xs md:text-sm font-medium">
        © 2026 EduVault Resources. Powered by Supabase & Vercel.
      </p>
    </footer>

    <script>
      // 1. SUPABASE CONFIGURATION
      const supabaseUrl = "https://czqiszxboldfuqeeyqiz.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cWlzenhib2xkZnVxZWV5cWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDU2MjgsImV4cCI6MjA5MTkyMTYyOH0.HTliya4-GKOxFD3K0pGyPNhexoK-mtd9wpFpWLkYNpU";
      const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

      let activeSubject = null;

      // 2. RENDER HOME (FETCH DATA)
      async function renderHome(sem) {
        const grid = document.getElementById("subject-grid");

        // Loader UI
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-slate-500 font-bold animate-pulse tracking-widest uppercase text-xs">Syncing Database...</p>
          </div>`;

        // Tab UI
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
          btn.classList.add("text-slate-400");
        });
        const activeTab = document.getElementById(`sem-${sem}`);
        if (activeTab) {
          activeTab.classList.add("active");
          activeTab.classList.remove("text-slate-400");
        }

        // FETCH FROM SUPABASE
        const { data: Subjects, error } = await _supabase
          .from("Subjects")
          .select("*")
          .eq("semester", sem);

        if (error) {
          grid.innerHTML = `<div class="col-span-full text-center text-red-500 font-bold">Failed to load Subjects.</div>`;
          return;
        }

        grid.innerHTML = "";
        Subjects.forEach((subject) => {
          const card = document.createElement("div");
          card.className =
            "subject-card p-6 md:p-8 rounded-3xl cursor-pointer bg-white dark:bg-[#0f172a] h-full";
          card.onclick = () => openSubject(subject);
          card.innerHTML = `
            <div class="flex flex-col h-full">
              <span class="text-[9px] text-blue-500 font-black uppercase tracking-widest mb-2">${subject.paper_code || "CS-CORE"}</span>
              <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-xl flex items-center justify-center mb-4 shrink-0">
                  <i class="fa-solid fa-folder-open text-lg"></i>
              </div>
              <div class="flex-grow">
                  <h3 class="font-extrabold text-lg md:text-xl text-slate-800 dark:text-slate-100 leading-tight">
                    ${subject.subject_name}
                  </h3>
              </div>
              <div class="mt-6 pt-4 border-t border-slate-50 dark:border-slate-800/50 flex justify-between items-center">
                  <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Resources Available</p>
                  <i class="fa-solid fa-arrow-right text-blue-600"></i>
              </div>
            </div>`;
          grid.appendChild(card);
        });
      }

      function openSubject(subject) {
        activeSubject = subject;
        document.getElementById("home-page").classList.add("hidden");
        document.getElementById("detail-page").classList.remove("hidden");
        document.getElementById("detail-title").innerText =
          subject.subject_name;
        switchSubTab("notes");
        window.scrollTo(0, 0);
      }

      function goHome() {
        document.getElementById("home-page").classList.remove("hidden");
        document.getElementById("detail-page").classList.add("hidden");
        window.scrollTo(0, 0);
      }

      function switchSubTab(type) {
        document
          .querySelectorAll(".sub-tab")
          .forEach((tab) => tab.classList.remove("active"));
        document.getElementById(`btn-${type}`).classList.add("active");
        const container = document.getElementById("tab-content");
        container.innerHTML = "";

        // Handle JSON unit list
        const units = Array.isArray(activeSubject.unit_list)
          ? activeSubject.unit_list
          : JSON.parse(activeSubject.unit_list || "[]");

        if (type === "notes") {
          units.forEach((uName, index) => {
            container.innerHTML += `
              <div class="flex justify-between items-center p-4 md:p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl md:rounded-3xl shadow-sm hover:border-blue-500 transition-all">
                  <div class="flex items-center gap-3 md:gap-5">
                      <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-600 text-white flex items-center justify-center rounded-xl font-black text-xs">U${index + 1}</div>
                      <div>
                          <h4 class="font-bold text-slate-800 dark:text-slate-100 text-xs md:text-base leading-tight">${uName}</h4>
                          <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Study Material</p>
                      </div>
                  </div>
                  <button onclick="window.open('https://rzp.io/l/your_link', '_blank')" class="bg-slate-900 dark:bg-blue-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Buy ₹20</button>
              </div>`;
          });
        } else if (type === "pyqs") {
          ["2025 Regular", "2024 Regular"].forEach((year) => {
            container.innerHTML += `
              <div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm">
                  <div class="flex items-center gap-5">
                      <i class="fa-solid fa-file-invoice text-blue-500 text-2xl"></i>
                      <span class="font-bold text-slate-700 dark:text-slate-200 text-xs md:text-base">${year} Paper</span>
                  </div>
                  <button class="text-blue-600 font-black text-xs uppercase hover:underline">Download</button>
              </div>`;
          });
        } else if (type === "lectures") {
          units.forEach((uName) => {
            const yt = `https://www.youtube.com/results?search_query=${encodeURIComponent(activeSubject.subject_name + " " + uName)}`;
            container.innerHTML += `
              <div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm">
                  <div class="flex items-center gap-5">
                      <i class="fa-brands fa-youtube text-red-600 text-4xl"></i>
                      <h4 class="font-bold text-slate-700 dark:text-slate-200 text-xs md:text-base">${uName} Video</h4>
                  </div>
                  <a href="${yt}" target="_blank" class="text-slate-400 font-black text-xs uppercase hover:text-blue-600 underline">Watch</a>
              </div>`;
          });
        }
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        document.getElementById("theme-icon").className = isDark
          ? "fa-solid fa-sun text-yellow-500"
          : "fa-solid fa-moon text-slate-500";
      }

      // Start on Semester 1
      renderHome(1);
    </script>
  </body>
</html>
