<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVault | University Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="orange.png" />
    <script>tailwind.config = { darkMode: "class" };</script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap");
      body { font-family: "Inter", sans-serif; scroll-behavior: smooth; }
      .tab-btn.active { color: #2563eb; position: relative; }
      .tab-btn.active::after { content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 4px; background-color: #2563eb; border-radius: 10px; }
      .subject-card { border: 1px solid #e2e8f0; transition: all 0.3s ease; }
      .dark .subject-card { border-color: #1e293b; background: #0f172a; }
      .subject-card:hover { transform: translateY(-5px); border-color: #2563eb; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-[#020617] dark:text-slate-100 min-h-screen">
    
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-[#020617]/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
      <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="goHome()">
          <img src="orange.png" alt="Logo" class="w-8 h-8 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <i class="fa-solid fa-graduation-cap text-blue-600 text-2xl hidden"></i>
          <h1 class="font-bold text-xl tracking-tight">Edu<span class="text-blue-600">Vault</span></h1>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center">
          <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
      </div>
    </nav>

    <div id="payment-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center border border-slate-200 dark:border-slate-800">
            <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fa-brands fa-whatsapp text-3xl"></i>
            </div>
            <h3 class="text-xl font-black mb-1">Buy on WhatsApp</h3>
            <p id="modal-unit-name" class="text-blue-600 text-[10px] font-bold uppercase mb-6 tracking-widest"></p>
            <p class="text-xs text-slate-500 mb-6 font-medium">Click below to message us. You can pay ₹21 directly in the chat using the WhatsApp Pay icon or UPI.</p>
            <button id="confirm-pay-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 mb-4">Continue to Chat</button>
            <button onclick="closeModal()" class="text-slate-400 text-[10px] font-black uppercase">Cancel</button>
        </div>
    </div>

    <main id="home-page" class="max-w-6xl mx-auto px-4 py-12">
      <header class="mb-12">
        <h2 class="text-5xl font-extrabold mb-4">University <span class="text-blue-600">Notes.</span></h2>
        <p class="text-slate-500 text-lg">Premium notes for engineering students.</p>
      </header>
      <div class="flex gap-6 border-b border-slate-200 dark:border-slate-800 mb-8 overflow-x-auto no-scrollbar pb-1">
        <button onclick="renderHome(1)" id="sem-1" class="tab-btn active pb-4 font-extrabold text-lg whitespace-nowrap">Sem I</button>
        <button onclick="renderHome(2)" id="sem-2" class="tab-btn pb-4 font-extrabold text-lg text-slate-400 whitespace-nowrap">Sem II</button>
        <button onclick="renderHome(3)" id="sem-3" class="tab-btn pb-4 font-extrabold text-lg text-slate-400 whitespace-nowrap">Sem III</button>
        <button onclick="renderHome(4)" id="sem-4" class="tab-btn pb-4 font-extrabold text-lg text-slate-400 whitespace-nowrap">Sem IV</button>
      </div>
      <div id="subject-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <main id="detail-page" class="hidden max-w-6xl mx-auto px-4 py-12">
      <button onclick="goHome()" class="mb-8 flex items-center text-blue-600 font-bold hover:gap-2 transition-all">
        <i class="fa-solid fa-arrow-left mr-2"></i> Back
      </button>
      <div class="flex flex-col lg:flex-row gap-12">
        <div class="w-full lg:w-1/3 text-center lg:text-left">
          <div id="subject-image-container" class="w-64 h-64 rounded-[2.5rem] overflow-hidden mb-6 shadow-xl mx-auto lg:mx-0 border border-slate-200 dark:border-slate-800 bg-slate-100"></div>
          <h2 id="detail-title" class="text-3xl font-black mb-4 tracking-tight"></h2>
        </div>
        <div class="w-full lg:w-2/3">
          <div id="tab-content" class="grid grid-cols-1 gap-4"></div>
        </div>
      </div>
    </main>

    <script>
      const WA_NUMBER = "917668054747";
      const supabaseUrl = 'https://czqiszxboldfuqeeyqiz.supabase.co';
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cWlzenhib2xkZnVxZWV5cWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDU2MjgsImV4cCI6MjA5MTkyMTYyOH0.HTliya4-GKOxFD3K0pGyPNhexoK-mtd9wpFpWLkYNpU";
      const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
      let selectedUnit = "";

      async function renderHome(sem) {
        const grid = document.getElementById("subject-grid");
        grid.innerHTML = `<div class="col-span-full py-20 text-center font-bold">Loading...</div>`;
        document.querySelectorAll(".tab-btn").forEach(b => { b.classList.remove("active"); b.classList.add("text-slate-400"); });
        document.getElementById(`sem-${sem}`).classList.add("active");
        document.getElementById(`sem-${sem}`).classList.remove("text-slate-400");

        const { data, error } = await _supabase.from("Subjects").select("*").eq("semester", sem);
        if (error) return;
        grid.innerHTML = "";
        data.forEach(sub => {
          const card = document.createElement("div");
          card.className = "subject-card p-8 rounded-3xl bg-white dark:bg-[#0f172a] cursor-pointer shadow-sm";
          card.onclick = () => openSubject(sub);
          card.innerHTML = `<h3 class="font-bold text-xl mb-4">${sub.subject_name}</h3><div class="text-blue-600 text-sm font-bold flex items-center gap-1">View Units <i class="fa-solid fa-chevron-right text-[10px]"></i></div>`;
          grid.appendChild(card);
        });
      }

      function openSubject(sub) {
        document.getElementById("home-page").classList.add("hidden");
        document.getElementById("detail-page").classList.remove("hidden");
        document.getElementById("detail-title").innerText = sub.subject_name;
        const img = document.getElementById("subject-image-container");
        img.innerHTML = sub.image_url ? `<img src="${sub.image_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-blue-600/10"><i class="fa-solid fa-book-open text-7xl"></i></div>`;
        
        const container = document.getElementById("tab-content");
        container.innerHTML = "";
        let units = [];
        try { units = Array.isArray(sub.unit_list) ? sub.unit_list : JSON.parse(sub.unit_list || "[]"); } catch(e) {}
        
        units.forEach((u, i) => {
          container.innerHTML += `<div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl shadow-sm hover:border-blue-500 transition-all">
                <div><h4 class="font-bold text-sm">Unit ${i+1}: ${u}</h4><p class="text-[10px] text-slate-400 font-bold uppercase mt-1">₹21 Access</p></div>
                <button onclick="triggerPaymentFlow('${u}')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/10 active:scale-95">Buy Now</button>
            </div>`;
        });
        window.scrollTo(0, 0);
      }

      function triggerPaymentFlow(uName) {
        selectedUnit = uName;
        document.getElementById("modal-unit-name").innerText = uName;
        document.getElementById("payment-modal").classList.remove("hidden");
        document.getElementById("payment-modal").classList.add("flex");
      }

      document.getElementById("confirm-pay-btn").onclick = function() {
        const msg = `Hi! I want to buy the notes for: ${selectedUnit}.\n I'm paying ₹21 to UPI: 7668054747@ibl\n My Gmail ID is:`;
        window.location.href = `whatsapp://send?phone=${WA_NUMBER}&text=${encodeURIComponent(msg)}`;
        setTimeout(() => { if (document.hasFocus()) window.location.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`; }, 1000);
        closeModal();
      };

      function closeModal() { document.getElementById("payment-modal").classList.add("hidden"); document.getElementById("payment-modal").classList.remove("flex"); }
      function goHome() { document.getElementById("home-page").classList.remove("hidden"); document.getElementById("detail-page").classList.add("hidden"); }
      function toggleTheme() { 
        const isDark = document.documentElement.classList.toggle("dark"); 
        document.getElementById("theme-icon").className = isDark ? "fa-solid fa-sun text-yellow-500" : "fa-solid fa-moon text-slate-500"; 
      }
      renderHome(1);
    </script>
  </body>
</html>
