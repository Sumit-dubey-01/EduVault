<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  
  <link rel="icon" type="image/png" href="orange.png">
  
  <link rel="apple-touch-icon" href="orange.png">

    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      body {
        font-family: "Inter", sans-serif;
        scroll-behavior: smooth;
      }
      .transition-theme {
        transition:
          background-color 0.4s ease,
          color 0.4s ease;
      }
      .tab-btn {
        position: relative;
        transition: all 0.3s ease;
      }
      .tab-btn.active {
        color: #2563eb;
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: #2563eb;
        border-radius: 10px;
      }
      .subject-card {
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
      }
      .dark .subject-card {
        border-color: #1e293b;
        background: #0f172a;
      }
      .subject-card:hover {
        transform: translateY(-5px);
        border-color: #2563eb;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .sub-tab.active {
        background: #2563eb;
        color: white;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-900 dark:bg-[#020617] dark:text-slate-100 transition-theme min-h-screen"
  >
    <nav
      class="sticky top-0 z-50 bg-white/80 dark:bg-[#020617]/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"
    >
      <div
        class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center"
      >
        <div
          class="flex items-center space-x-2 cursor-pointer"
          onclick="goHome()"
        >
          <i class="fa-solid fa-graduation-cap text-blue-600 text-2xl"></i>
          <h1 class="font-bold text-xl tracking-tight">
            University<span class="text-blue-600">Notes</span>
          </h1>
        </div>
        <button
          onclick="toggleTheme()"
          class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          <i id="theme-icon" class="fa-solid fa-moon text-slate-500"></i>
        </button>
      </div>
    </nav>

    <main id="home-page" class="max-w-6xl mx-auto px-6 py-12">
      <header class="mb-16">
        <h2 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">
          Master Your <span class="text-blue-600">Semester.</span>
        </h2>
        <p
          class="text-slate-500 dark:text-slate-400 text-lg md:text-xl max-w-2xl leading-relaxed"
        >
          Handwritten notes, PYQs, and curated video lectures for B.Tech CSE.
        </p>
      </header>

      <div
        class="flex gap-10 border-b border-slate-200 dark:border-slate-800 mb-10 overflow-x-auto no-scrollbar pb-1"
      >
        <button
          onclick="renderHome(1)"
          id="sem-1"
          class="tab-btn active pb-4 font-extrabold text-xl whitespace-nowrap"
        >
          Semester I
        </button>
        <button
          onclick="renderHome(2)"
          id="sem-2"
          class="tab-btn pb-4 font-extrabold text-xl text-slate-400 whitespace-nowrap"
        >
          Semester II
        </button>
        <button
          onclick="renderHome(3)"
          id="sem-3"
          class="tab-btn pb-4 font-extrabold text-xl text-slate-400 whitespace-nowrap"
        >
          Semester III
        </button>
        <button
          onclick="renderHome(4)"
          id="sem-4"
          class="tab-btn pb-4 font-extrabold text-xl text-slate-400 whitespace-nowrap"
        >
          Semester IV
        </button>
      </div>

      <div
        id="subject-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start"
      ></div>
    </main>

    <main id="detail-page" class="hidden max-w-6xl mx-auto px-6 py-12">
      <button
        onclick="goHome()"
        class="mb-8 flex items-center text-blue-600 font-bold hover:gap-3 transition-all"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
      </button>

      <div class="flex flex-col lg:flex-row gap-12 items-start">
        <div
          class="w-full lg:w-1/3 sticky top-24 bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm"
        >
          <div
            class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-2xl flex items-center justify-center mb-6"
          >
            <i class="fa-solid fa-book-open-reader text-2xl"></i>
          </div>
          <h2
            id="detail-title"
            class="text-3xl font-black mb-4 leading-tight"
          ></h2>
          <div
            class="flex items-center gap-2 text-green-500 font-bold text-sm mb-6"
          >
            <i class="fa-solid fa-circle-check"></i> Verified Content 2026
          </div>
          <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
            Complete unit-wise resources and previous year papers for your
            preparation.
          </p>
        </div>

        <div class="w-full lg:w-2/3">
          <div
            class="flex gap-2 p-1.5 bg-slate-200 dark:bg-slate-800 rounded-2xl mb-8"
          >
            <button
              onclick="switchSubTab('notes')"
              id="btn-notes"
              class="sub-tab active flex-1 py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all"
            >
              Notes
            </button>
            <button
              onclick="switchSubTab('pyqs')"
              id="btn-pyqs"
              class="sub-tab flex-1 py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all"
            >
              PYQs
            </button>
            <button
              onclick="switchSubTab('lectures')"
              id="btn-lectures"
              class="sub-tab flex-1 py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all"
            >
              Lectures
            </button>
          </div>
          <div id="tab-content" class="space-y-4"></div>
        </div>
      </div>
    </main>

    <footer
      class="max-w-6xl mx-auto px-6 py-12 border-t border-slate-200 dark:border-slate-800 text-center"
    >
      <p class="text-slate-400 font-medium">
        © 2026 EduVault Resources. All rights reserved. Designed and developed by Sumit.
      </p>
    </footer>

    <script>
      const syllabusData = {
        1: [
          {
            name: "Engineering Mathematics-I",
            units: [
              "Differential Calculus",
              "Linear Algebra",
              "Multiple Integrals",
              "Vector Calculus",
            ],
          },
          {
            name: "Engineering Physics-I",
            units: ["Basics of Relativity", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Introduction to C",
            units: [
              "Basic Terminology & Standard Library",
              "Unit 2",
              "Unit 3",
              "Unit 4",
            ],
          },
          {
            name: "Electrical Engineering",
            units: ["Network & Circuit Concepts", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Professional Communication",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Environment & Ecology",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
        ],
        2: [
          {
            name: "Engineering Mathematics-II",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Engineering Physics-II",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Graph Theory",
            units: ["Basic Definitions", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Object Oriented Modeling & C++",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Humanities",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Electronics Engineering",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
        ],
        3: [
          {
            name: "Discrete Mathematics",
            units: [
              "Sets, Functions & Relations",
              "Group Theory Properties",
              "Unit 3",
              "Unit 4",
            ],
          },
          {
            name: "Applied Computational Methods",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Digital Circuits",
            units: [
              "Binary Codes & Boolean Expressions",
              "K-Map Reduction",
              "Unit 3",
              "Unit 4",
            ],
          },
          {
            name: "Data Structures through C/C++",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Internet & JAVA Programming",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Software Engineering (SWE)",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
        ],
        4: [
          {
            name: "Optimization Techniques",
            units: [
              "Classical Optimization",
              "Linear Programming",
              "Unit 3",
              "Unit 4",
            ],
          },
          {
            name: "Management Information System",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Database Management Systems",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
          {
            name: "Theory of Computation",
            units: ["Unit 1", "Unit 2", "Unit 3", "Turing Machines"],
          },
          {
            name: "Computer Organization",
            units: [
              "RTL & Bus Architecture",
              "Control & Processor Design",
              "Arithmetic Operations",
              "I/O & Memory Organization",
            ],
          },
          {
            name: "Microprocessors",
            units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"],
          },
        ],
      };

      let activeSubject = null;

      function renderHome(sem) {
        const grid = document.getElementById("subject-grid");
        grid.innerHTML = "";
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
          btn.classList.add("text-slate-400");
        });
        const activeTab = document.getElementById(`sem-${sem}`);
        activeTab.classList.add("active");
        activeTab.classList.remove("text-slate-400");

        syllabusData[sem].forEach((subject) => {
          const card = document.createElement("div");
          card.className =
            "subject-card p-8 rounded-[2rem] cursor-pointer bg-white dark:bg-[#0f172a]";
          card.onclick = () => openSubject(subject);
          card.innerHTML = `
                    <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-folder-open text-lg"></i>
                    </div>
                    <h3 class="font-extrabold text-xl text-slate-800 dark:text-slate-100">${subject.name}</h3>
                    <p class="text-xs text-slate-400 font-semibold mt-2 uppercase tracking-wider">Explore Resources <i class="fa-solid fa-arrow-right ml-1"></i></p>
                `;
          grid.appendChild(card);
        });
      }

      function openSubject(subject) {
        activeSubject = subject;
        document.getElementById("home-page").classList.add("hidden");
        document.getElementById("detail-page").classList.remove("hidden");
        document.getElementById("detail-title").innerText = subject.name;
        switchSubTab("notes");
        window.scrollTo(0, 0);
      }

      function goHome() {
        document.getElementById("home-page").classList.remove("hidden");
        document.getElementById("detail-page").classList.add("hidden");
        window.scrollTo(0, 0);
      }

      function switchSubTab(type) {
        document
          .querySelectorAll(".sub-tab")
          .forEach((tab) => tab.classList.remove("active"));
        document.getElementById(`btn-${type}`).classList.add("active");
        const container = document.getElementById("tab-content");
        container.innerHTML = "";

        if (type === "notes") {
          activeSubject.units.forEach((uName, index) => {
            container.innerHTML += `
                        <div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm hover:border-blue-500 transition-all">
                            <div class="flex items-center gap-5">
                                <div class="w-12 h-12 bg-blue-600 text-white flex items-center justify-center rounded-2xl font-black">U${index + 1}</div>
                                <div>
                                    <h4 class="font-bold text-slate-800 dark:text-slate-100 text-sm md:text-base">${uName}</h4>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Full Handwritten PDF</p>
                                </div>
                            </div>
                            <button class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">Buy ₹20</button>
                        </div>`;
          });
        } else if (type === "pyqs") {
          [
            "2025 Regular",
            "2024 Regular",
            "2023 Carry Over",
            "2022 Regular",
          ].forEach((year) => {
            container.innerHTML += `
                        <div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm">
                            <div class="flex items-center gap-5">
                                <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
                                <span class="font-bold text-slate-700 dark:text-slate-200">${year} Exam Paper</span>
                            </div>
                            <button class="text-blue-600 font-black text-xs uppercase hover:underline">Download</button>
                        </div>`;
          });
        } else if (type === "lectures") {
          activeSubject.units.forEach((uName, index) => {
            const ytSearch = `https://www.youtube.com/results?search_query=${encodeURIComponent(activeSubject.name + " " + uName + " lecture")}`;
            container.innerHTML += `
                        <div class="flex justify-between items-center p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm">
                            <div class="flex items-center gap-5">
                                <i class="fa-brands fa-youtube text-red-600 text-4xl"></i>
                                <div>
                                    <h4 class="font-bold text-slate-700 dark:text-slate-200">${uName} Video</h4>
                                    <span class="text-[10px] text-green-500 font-black tracking-tighter uppercase">Curated Resources</span>
                                </div>
                            </div>
                            <a href="${ytSearch}" target="_blank" class="text-slate-400 font-black text-xs uppercase hover:text-blue-600 underline">Watch on YT</a>
                        </div>`;
          });
        }
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        document.getElementById("theme-icon").className = isDark
          ? "fa-solid fa-sun text-yellow-500"
          : "fa-solid fa-moon text-slate-500";
      }

      renderHome(1);
    </script>
  </body>
</html>
